name: CI front

# Integration continue : verifie que le front compile et que les tests passent
# a chaque push ou pull request sur develop et main.
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Construire l'application
        run: npm run build

      - name: Lancer les tests
        run: npm test
