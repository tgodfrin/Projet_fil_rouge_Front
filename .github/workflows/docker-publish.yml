name: CD front (tests + publication)

# Lors d'un push sur main : lance d'abord les tests, et SEULEMENT s'ils passent
# fabrique et publie l'image front sur Docker Hub.
on:
  push:
    branches: [main]

jobs:
  # 1) Garde-fou : compile et lance les tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Construire l'application
        run: npm run build

      - name: Lancer les tests
        run: npm test

  # 2) Publication de l'image : ne demarre que si les tests sont verts.
  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Se connecter a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construire et pousser l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/locmns-front:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/locmns-front:${{ github.sha }}
