<div class="incident-page">

  <!-- Header -->
  <div class="page-header">
    <button class="btn-back" (click)="goBack()">‹ Retour</button>
    <div class="page-title">Signaler un incident</div>
  </div>

  <!-- Équipement concerné -->
  <div class="equipment-card">
    <div class="equipment-icon">{{ loan.categoryIcon }}</div>
    <div class="equipment-info">
      <div class="equipment-name">{{ loan.equipmentName }}</div>
      <div class="equipment-dates">Emprunt du {{ loan.dateRange }}</div>
    </div>
  </div>

  <!-- Type d'incident -->
  <div class="section-label">Type d'incident</div>
  <div class="incident-grid">
    @for (option of incidentOptions; track option.type) {
      <button
        class="incident-type"
        [class.selected]="selectedType() === option.type"
        (click)="selectType(option.type)">
        <div class="incident-icon">{{ option.icon }}</div>
        <div class="incident-label">{{ option.label }}</div>
      </button>
    }
  </div>

  <!-- Description -->
  <div class="form-group">
    <label class="form-label">Description</label>
    <textarea
      class="form-textarea"
      placeholder="Décrivez le problème rencontré..."
      rows="4"
      (input)="onDescriptionChange($event)">
    </textarea>
  </div>

  <!-- Photo -->
  <div class="form-group">
    <label class="form-label">Photo (optionnel)</label>
    <div class="photo-upload">
      <span class="photo-icon">📷</span>
      <span class="photo-label">Ajouter une photo</span>
    </div>
  </div>

  <!-- Submit -->
  <button class="btn-submit" [disabled]="!canSubmit()" (click)="submit()">
    Envoyer le signalement
  </button>

</div>
