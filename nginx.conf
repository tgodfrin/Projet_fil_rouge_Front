server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Appels API -> back-end. proxy_pass sans URI conserve le chemin complet,
    # donc /api/login arrive bien sur /api/login cote Spring (server.servlet.context-path=/api).
    # "back" = nom du service back dans docker-compose.prod.yml.
    location /api/ {
        proxy_pass http://back:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Front et back servis sur le meme domaine : on supprime l'en-tete Origin
        # pour que Spring traite l'appel comme same-origin (pas de validation CORS en prod).
        proxy_set_header Origin            "";
    }

    # SPA Angular : toute autre route est geree par le routing client -> index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
